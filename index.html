<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FestlApp">
  <meta name="theme-color" content="#2563EB">
  <title>FestlApp Kellner</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--blue:#2563EB;--blue-dark:#1d4ed8;--blue-light:#eff6ff;--green:#16a34a;--red:#dc2626;--gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-400:#9ca3af;--gray-600:#4b5563;--gray-800:#1f2937;--white:#ffffff;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.08);--shadow-lg:0 8px 32px rgba(0,0,0,0.12)}
    html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray-50);color:var(--gray-800);-webkit-font-smoothing:antialiased}
    #app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .screen{height:100vh;display:flex;flex-direction:column;overflow:hidden}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--white);border-bottom:1px solid var(--gray-200);min-height:52px;flex-shrink:0}
    .topbar-title{font-weight:700;font-size:17px}
    .waiter-badge{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--blue);background:var(--blue-light);padding:6px 12px;border-radius:20px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border:none;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;width:100%;transition:opacity 0.15s,transform 0.1s}
    .btn:active{transform:scale(0.97)}
    .btn:disabled{opacity:0.4;cursor:not-allowed}
    .btn-primary{background:var(--blue);color:var(--white)}
    .btn-outline{background:var(--white);color:var(--blue);border:2px solid var(--blue)}
    .btn-success{background:var(--green);color:var(--white)}
    .btn-large{padding:18px 32px;font-size:18px;border-radius:16px}
    .btn-icon{background:none;border:none;color:var(--blue);font-size:14px;font-weight:600;cursor:pointer;padding:4px 8px}
    .card{background:var(--white);border-radius:20px;padding:24px;box-shadow:var(--shadow)}
    /* LOGIN */
    .login-screen{justify-content:center;align-items:center;padding:24px;gap:20px;background:linear-gradient(160deg,#eff6ff 0%,#ffffff 100%);overflow-y:auto}
    .logo{font-size:64px;text-align:center;margin-bottom:4px}
    .login-screen h1{font-size:36px;font-weight:800;color:var(--blue);letter-spacing:-1px;text-align:center}
    .subtitle{color:var(--gray-400);font-size:15px;text-align:center}
    .login-card{width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px}
    .login-card h2{font-size:20px;font-weight:700}
    .hint{font-size:14px;color:var(--gray-400)}
    .divider{display:flex;align-items:center;gap:12px;color:var(--gray-400);font-size:13px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--gray-200)}
    .form-group{display:flex;flex-direction:column;gap:6px}
    label{font-size:13px;font-weight:600;color:var(--gray-600)}
    input{width:100%;padding:14px 16px;border:2px solid var(--gray-200);border-radius:var(--radius);font-size:16px;font-family:inherit;color:var(--gray-800);background:var(--white);outline:none;-moz-appearance:textfield}
    input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
    input:focus{border-color:var(--blue)}
    .error{color:var(--red);font-size:14px;font-weight:500;text-align:center;padding:8px;background:#fef2f2;border-radius:8px}
    /* TABLE */
    .table-screen{background:var(--white)}
    .center-content{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:32px}
    .center-content h2{font-size:28px;font-weight:700}
    .table-big{font-size:72px!important;font-weight:800!important;text-align:center;width:180px;padding:20px!important;border-radius:20px!important;border:3px solid var(--gray-200)!important;color:var(--blue)!important}
    .table-big:focus{border-color:var(--blue)!important}
    .btn-tbl{max-width:280px}
    /* ORDER */
    .order-screen{background:var(--gray-50)}
    .order-content{flex:1;overflow-y:auto;padding:12px 16px 80px}
    .cat-header{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--gray-400);padding:8px 4px}
    .menu-item{display:flex;align-items:center;justify-content:space-between;background:var(--white);padding:14px 16px;border-radius:var(--radius);margin-bottom:6px;box-shadow:var(--shadow)}
    .mi-info{display:flex;flex-direction:column;gap:2px}
    .mi-name{font-weight:600;font-size:15px}
    .mi-price{font-size:13px;color:var(--gray-400)}
    .qty-ctrl{display:flex;align-items:center;gap:12px}
    .qb{width:36px;height:36px;border-radius:50%;border:none;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .qb:disabled{opacity:0.3}
    .qb.plus{background:var(--blue);color:var(--white)}
    .qb.minus{background:var(--gray-100);color:var(--gray-800)}
    .qty-n{font-size:18px;font-weight:700;min-width:24px;text-align:center}
    .cart{background:var(--white);border-radius:16px;padding:16px;margin-top:8px;box-shadow:var(--shadow-lg);border:2px solid var(--blue-light)}
    .cart-hdr{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:16px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--gray-200)}
    .cart-tot{color:var(--blue);font-size:18px}
    .cart-row{display:flex;justify-content:space-between;font-size:14px;padding:4px 0;color:var(--gray-600)}
    /* CASH */
    .cash-screen{background:var(--gray-50)}
    .cash-content{flex:1;overflow-y:auto;padding:20px 16px 40px;display:flex;flex-direction:column;gap:16px}
    .cash-card{background:var(--white);border-radius:20px;padding:20px 24px;box-shadow:var(--shadow)}
    .tot-card{background:var(--blue)}
    .tot-card .cash-lbl{color:rgba(255,255,255,0.8)}
    .tot-card .cash-amt{color:var(--white)}
    .cash-lbl{font-size:14px;font-weight:600;color:var(--gray-400);margin-bottom:6px}
    .cash-amt{font-size:52px;font-weight:800;letter-spacing:-2px}
    .given-inp{font-size:48px!important;font-weight:800!important;text-align:center;border:none!important;padding:0!important;width:100%;color:var(--gray-800)!important;letter-spacing:-2px}
    .quick-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
    .qk-btn{flex-shrink:0;padding:12px 18px;border-radius:14px;border:2px solid var(--blue);background:var(--white);color:var(--blue);font-size:16px;font-weight:700;cursor:pointer}
    .qk-btn-p{background:var(--blue);color:var(--white)}
    .change-card{border:2px solid #dcfce7}
    .chg-green{color:var(--green)!important}
    /* MISC */
    #loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;z-index:200}
    .spinner{width:44px;height:44px;border:4px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none!important}
    #qr-video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:100;background:#000}
    #qr-close-btn{position:fixed;top:20px;right:20px;z-index:101;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:48px;height:48px;font-size:22px;cursor:pointer}
    #qr-canvas{display:none}
  </style>
</head>
<body>
<div id="app"></div>
<canvas id="qr-canvas"></canvas>
<script>
var PID='festlapp-ce1d0',AKEY='AIzaSyAzBxshvJ5Tv3MfoJ5nQ9sgVG-5ot2QuGc';
var BASE='https://firestore.googleapis.com/v1/projects/'+PID+'/databases/(default)/documents';
var S={screen:'login',waiter:null,tableNumber:null,cart:[],menuItems:[],waiters:[],submittedOrder:null,tenantId:null};

async function fg(p){var r=await fetch(BASE+'/'+p+'?key='+AKEY);return r.json();}
async function fp(p,b){var r=await fetch(BASE+'/'+p+'?key='+AKEY,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});return r.json();}

function fv(v){
  if(typeof v==='string')return{stringValue:v};
  if(typeof v==='boolean')return{booleanValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.map(fv)}};
  if(typeof v==='number'&&!Number.isInteger(v))return{doubleValue:v};
  if(typeof v==='number')return{integerValue:String(v)};
  if(v&&typeof v==='object')return{mapValue:{fields:Object.fromEntries(Object.entries(v).map(function(e){return[e[0],fv(e[1])]}))}};
  return{nullValue:null};
}
function fr(f){
  if(!f)return null;
  if(f.stringValue!==undefined)return f.stringValue;
  if(f.doubleValue!==undefined)return f.doubleValue;
  if(f.integerValue!==undefined)return parseInt(f.integerValue);
  if(f.booleanValue!==undefined)return f.booleanValue;
  if(f.arrayValue)return(f.arrayValue.values||[]).map(fr);
  if(f.mapValue)return Object.fromEntries(Object.entries(f.mapValue.fields||{}).map(function(e){return[e[0],fr(e[1])]}));
  return null;
}
function did(n){return n.split('/').pop();}
async function loadMenu(){
  // Erst Tenant-Pfad versuchen
  var r=await fg(tp('menu'));
  // Falls leer, Root-Pfad versuchen
  if(!r.documents || r.documents.length===0){
    r=await fg('menu');
  }
  if(!r.documents)return[];
  return r.documents.map(function(d){
    var f=d.fields||{};
    return{id:did(d.name),name:fr(f.name),price:fr(f.price),category:fr(f.category),isAvailable:fr(f.isAvailable)};
  }).filter(function(m){return m.isAvailable;});
}


async function loadWaiters(){var r=await fg(tp('waiters'));if(!r.documents)return[];return r.documents.map(function(d){var f=d.fields||{};return{id:did(d.name),name:fr(f.name),qrCode:fr(f.qrCode),isActive:fr(f.isActive)};}).filter(function(w){return w.isActive;});}
async function loadMenu(){var r=await fg(tp('menu'));if(!r.documents)return[];return r.documents.map(function(d){var f=d.fields||{};return{id:did(d.name),name:fr(f.name),price:fr(f.price),category:fr(f.category),isAvailable:fr(f.isAvailable)};}).filter(function(m){return m.isAvailable;});}
async function findLicense(pin){var r=await fg('licenses');if(!r.documents)return null;var found=null;r.documents.forEach(function(d){var f=d.fields||{};var l={id:did(d.name),pin:fr(f.pin),isActive:fr(f.isActive)};if(l.pin===pin&&l.isActive)found=l;});return found;}
async function sendOrder(o){var items=o.items.map(function(i){return{menuItemId:i.menuItemId,menuItemName:i.menuItemName,price:i.price,quantity:i.quantity,note:''};});var fields={tableNumber:o.tableNumber,waiterName:o.waiterName,status:'open',items:items,total:o.total};var enc={};Object.keys(fields).forEach(function(k){enc[k]=fv(fields[k]);});enc.timestamp={timestampValue:new Date().toISOString()};await fp(tp('orders')+'/'+o.id,{fields:enc});}

function render(){
  var app=document.getElementById('app');
  if(S.screen==='login')app.innerHTML=rLogin();
  else if(S.screen==='table')app.innerHTML=rTable();
  else if(S.screen==='order')app.innerHTML=rOrder();
  else if(S.screen==='cash')app.innerHTML=rCash();
  attachEv();
}

function rLogin(){
  return '<div class="screen login-screen">'+
    '<div><div class="logo">🍺</div><h1>FestlApp</h1><p class="subtitle">Kellner-Bestellsystem</p></div>'+
    '<div class="card login-card">'+
      '<h2>Anmelden</h2>'+
      '<p class="hint">Scanne deinen QR-Code oder gib den Lizenz-PIN ein</p>'+
      '<button class="btn btn-outline" id="btn-scan">📷&nbsp;&nbsp;QR-Code scannen</button>'+
      '<div class="divider"><span>oder</span></div>'+
      '<div class="form-group"><label>Lizenz-PIN</label><input type="number" id="pin-inp" placeholder="PIN eingeben" inputmode="numeric"></div>'+
      '<button class="btn btn-primary" id="btn-pin">Freischalten</button>'+
      '<div id="login-err" class="error hidden"></div>'+
    '</div>'+
  '</div>';
}

function rTable(){
  return '<div class="screen table-screen">'+
    '<div class="topbar"><div class="waiter-badge">👤 '+(S.waiter?S.waiter.name:'Kellner')+'</div><button class="btn-icon" id="btn-logout">Abmelden</button></div>'+
    '<div class="center-content"><h2>Welcher Tisch?</h2>'+
      '<input type="number" id="tbl-inp" class="table-big" placeholder="0" min="1" max="99" inputmode="numeric">'+
      '<button class="btn btn-primary btn-large btn-tbl" id="btn-tbl-next">Weiter →</button>'+
    '</div>'+
  '</div>';
}

function rOrder(){
  var cats=[];S.menuItems.forEach(function(i){if(cats.indexOf(i.category)<0)cats.push(i.category);});cats.sort();
  var total=S.cart.reduce(function(s,i){return s+i.price*i.quantity;},0);
  var menuH=cats.map(function(cat){
    var icon=cat==='Speisen'?'🍽':cat==='Getränke'?'🥤':'✦';
    var items=S.menuItems.filter(function(i){return i.category===cat;});
    return '<div class="mb-16"><div class="cat-header">'+icon+' '+cat+'</div>'+
      items.map(function(item){
        var qty=0;S.cart.forEach(function(c){if(c.menuItemId===item.id)qty=c.quantity;});
        return '<div class="menu-item">'+
          '<div class="mi-info"><span class="mi-name">'+item.name+'</span><span class="mi-price">€ '+item.price.toFixed(2)+'</span></div>'+
          '<div class="qty-ctrl">'+
            '<button class="qb minus" data-id="'+item.id+'"'+(qty===0?' disabled':'')+'>−</button>'+
            '<span class="qty-n">'+qty+'</span>'+
            '<button class="qb plus" data-id="'+item.id+'" data-name="'+item.name+'" data-price="'+item.price+'">+</button>'+
          '</div>'+
        '</div>';
      }).join('')+'</div>';
  }).join('');
  var cartH=S.cart.length>0?'<div class="cart">'+
    '<div class="cart-hdr"><span>🛒 Bestellung</span><span class="cart-tot">€ '+total.toFixed(2)+'</span></div>'+
    S.cart.map(function(i){return'<div class="cart-row"><span>'+i.quantity+'× '+i.menuItemName+'</span><span>€ '+(i.price*i.quantity).toFixed(2)+'</span></div>';}).join('')+
    '<button class="btn btn-primary" style="margin-top:12px" id="btn-ord-pay">Bestellen & Bezahlen</button>'+
  '</div>':'';
  return '<div class="screen order-screen">'+
    '<div class="topbar"><button class="btn-icon" id="btn-back">← Tisch</button><div class="topbar-title">Tisch '+S.tableNumber+'</div><span style="font-size:13px;color:#9ca3af">'+(S.waiter?S.waiter.name:'')+'</span></div>'+
    '<div class="order-content">'+menuH+cartH+'</div>'+
  '</div>';
}

function rCash(){
  var o=S.submittedOrder;
  var denoms=[1,2,5,10,20,50,100,200];
  var nf=Math.ceil(o.total/5)*5;
  var amounts=[];
  if(nf>o.total)amounts.push(nf);
  denoms.forEach(function(d){if(d>=o.total&&amounts.indexOf(d)<0&&amounts.length<5)amounts.push(d);});
  amounts.sort(function(a,b){return a-b;});
  return '<div class="screen cash-screen">'+
    '<div class="topbar"><div class="topbar-title">Kasse – Tisch '+o.tableNumber+'</div></div>'+
    '<div class="cash-content">'+
      '<div class="cash-card tot-card"><div class="cash-lbl">Zu zahlen</div><div class="cash-amt">€ '+o.total.toFixed(2)+'</div></div>'+
      '<div class="cash-card"><div class="cash-lbl">Gegeben (€)</div><input type="number" id="given-inp" class="given-inp" placeholder="0.00" inputmode="decimal"></div>'+
      '<div class="quick-row">'+amounts.map(function(a,i){return'<button class="qk-btn'+(i===0?' qk-btn-p':'')+'" data-amount="'+a+'">€ '+(a%1===0?a:a.toFixed(2))+'</button>';}).join('')+'</div>'+
      '<div id="chg-card" class="cash-card change-card hidden"><div class="cash-lbl">Retourgeld</div><div id="chg-val" class="cash-amt">€ 0.00</div></div>'+
      '<button class="btn btn-success btn-large hidden" id="btn-done">✓ Fertig – Neuer Tisch</button>'+
    '</div>'+
  '</div>';
}

function attachEv(){
  if(S.screen==='login'){
    document.getElementById('btn-pin').onclick=function(){var p=(document.getElementById('pin-inp').value||'').trim();if(p)doPinLogin(p);};
    document.getElementById('pin-inp').onkeydown=function(e){if(e.key==='Enter'){var p=e.target.value.trim();if(p)doPinLogin(p);}};
    document.getElementById('btn-scan').onclick=startQR;
  }
  if(S.screen==='table'){
    var inp=document.getElementById('tbl-inp');
    if(inp)setTimeout(function(){inp.focus();},100);
    document.getElementById('btn-logout').onclick=function(){S={screen:'login',waiter:null,tableNumber:null,cart:[],menuItems:[],waiters:[],submittedOrder:null,tenantId:null};render();};
    document.getElementById('btn-tbl-next').onclick=function(){var n=parseInt((document.getElementById('tbl-inp').value||'0'));if(!n||n<1||n>99)return;S.tableNumber=n;S.cart=[];S.screen='order';render();};
    if(inp)inp.onkeydown=function(e){if(e.key==='Enter')document.getElementById('btn-tbl-next').onclick();};
  }
  if(S.screen==='order'){
    document.getElementById('btn-back').onclick=function(){S.screen='table';render();};
    document.querySelectorAll('.qb.plus').forEach(function(btn){
      btn.onclick=function(){
        var id=btn.dataset.id,name=btn.dataset.name,price=parseFloat(btn.dataset.price),idx=-1;
        S.cart.forEach(function(c,i){if(c.menuItemId===id)idx=i;});
        if(idx>=0)S.cart[idx].quantity++;else S.cart.push({menuItemId:id,menuItemName:name,price:price,quantity:1});
        render();
      };
    });
    document.querySelectorAll('.qb.minus').forEach(function(btn){
      btn.onclick=function(){
        var id=btn.dataset.id,idx=-1;
        S.cart.forEach(function(c,i){if(c.menuItemId===id)idx=i;});
        if(idx<0)return;
        if(S.cart[idx].quantity>1)S.cart[idx].quantity--;else S.cart.splice(idx,1);
        render();
      };
    });
    var ob=document.getElementById('btn-ord-pay');
    if(ob)ob.onclick=async function(){
      if(S.cart.length===0)return;
      showLoad(true);
      var total=S.cart.reduce(function(s,i){return s+i.price*i.quantity;},0);
      var order={id:Math.random().toString(36).substr(2,9)+Date.now().toString(36),tableNumber:S.tableNumber,waiterName:S.waiter?S.waiter.name:'Kellner',items:S.cart,total:total};
      try{await sendOrder(order);S.submittedOrder=order;S.cart=[];S.screen='cash';render();}
      catch(e){alert('Fehler beim Senden. Bitte nochmal versuchen.');}
      showLoad(false);
    };
  }
  if(S.screen==='cash'){
    var o=S.submittedOrder;
    var gi=document.getElementById('given-inp');
    function upd(){
      var given=parseFloat(gi.value)||0,change=given-o.total;
      var cc=document.getElementById('chg-card'),cv=document.getElementById('chg-val'),db=document.getElementById('btn-done');
      if(given>=o.total){cc.classList.remove('hidden');db.classList.remove('hidden');cv.textContent='€ '+Math.max(0,change).toFixed(2);cv.className='cash-amt'+(change>0?' chg-green':'');}
      else{cc.classList.add('hidden');db.classList.add('hidden');}
    }
    gi.oninput=upd;
    document.querySelectorAll('.qk-btn').forEach(function(btn){
      btn.onclick=function(){var a=parseFloat(btn.dataset.amount);gi.value=a%1===0?a:a.toFixed(2);gi.blur();upd();};
    });
    document.getElementById('btn-done').onclick=function(){S.submittedOrder=null;S.tableNumber=null;S.screen='table';render();};
  }
}

async function doPinLogin(pin){
  setErr('');showLoad(true);
  try{
    var lic=await findLicense(pin);
    if(!lic){setErr('Ungültiger PIN');showLoad(false);return;}
    S.tenantId=lic.id;
    S.waiters=await loadWaiters();
    S.menuItems=await loadMenu();
    S.waiter={name:'Kellner',id:'guest'};
    S.screen='table';render();
  }catch(e){setErr('Verbindungsfehler. Bitte nochmal versuchen.');}
  showLoad(false);
}

var scanning=false,qrStr=null;
async function startQR(){
  try{
    var vid=document.createElement('video');vid.id='qr-video';vid.setAttribute('playsinline','');
    var cb=document.createElement('button');cb.id='qr-close-btn';cb.textContent='✕';
    cb.onclick=function(){stopQR(vid,cb);};
    document.body.appendChild(vid);document.body.appendChild(cb);
    qrStr=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    vid.srcObject=qrStr;vid.play();scanning=true;
    scanF(vid,cb);
  }catch(e){setErr('Kamera nicht verfügbar');}
}
function stopQR(v,c){scanning=false;if(qrStr){qrStr.getTracks().forEach(function(t){t.stop();});qrStr=null;}if(v&&v.parentNode)v.parentNode.removeChild(v);if(c&&c.parentNode)c.parentNode.removeChild(c);}
function scanF(v,c){
  if(!scanning)return;
  if(v.readyState!==4){requestAnimationFrame(function(){scanF(v,c);});return;}
  var cv=document.getElementById('qr-canvas'),ctx=cv.getContext('2d');
  cv.width=v.videoWidth;cv.height=v.videoHeight;ctx.drawImage(v,0,0);
  var id=ctx.getImageData(0,0,cv.width,cv.height);
  if(window.jsQR){var code=window.jsQR(id.data,cv.width,cv.height);if(code){stopQR(v,c);handleQR(code.data);return;}}
  requestAnimationFrame(function(){scanF(v,c);});
}
async function handleQR(code){
  showLoad(true);
  if(S.tenantId){var w=null;S.waiters.forEach(function(x){if(x.qrCode===code)w=x;});if(w){S.waiter=w;S.screen='table';render();}else setErr('Unbekannter QR-Code');}
  else{await doPinLogin(code);}
  showLoad(false);
}

function setErr(msg){var el=document.getElementById('login-err');if(!el)return;el.textContent=msg;if(msg)el.classList.remove('hidden');else el.classList.add('hidden');}
function showLoad(show){var ex=document.getElementById('loading-overlay');if(show&&!ex){var el=document.createElement('div');el.id='loading-overlay';el.innerHTML='<div class="spinner"></div>';document.body.appendChild(el);}else if(!show&&ex){ex.parentNode.removeChild(ex);}}

var sc=document.createElement('script');sc.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';document.head.appendChild(sc);
render();
</script>
</body>
</html>
