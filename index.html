<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FestlApp">
  <meta name="theme-color" content="#2563EB">
  <link rel="manifest" href="/manifest.json">
  <title>FestlApp</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #2563EB;
      --blue-dark:  #1d4ed8;
      --blue-light: #eff6ff;
      --green:      #16a34a;
      --red:        #dc2626;
      --orange:     #ea580c;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-400:   #9ca3af;
      --gray-600:   #4b5563;
      --gray-800:   #1f2937;
      --white:      #ffffff;
      --radius:     12px;
      --shadow:     0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg:  0 8px 32px rgba(0,0,0,0.12);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    #app { height: 100%; }

    /* ── Screens ── */
    .screen {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      min-height: 52px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-weight: 700;
      font-size: 17px;
      color: var(--gray-800);
    }

    .waiter-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 600;
      color: var(--blue);
      background: var(--blue-light);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .waiter-small {
      font-size: 13px;
      color: var(--gray-400);
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-align: center;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary  { background: var(--blue);  color: var(--white); }
    .btn-outline  { background: var(--white);  color: var(--blue);
                    border: 2px solid var(--blue); }
    .btn-success  { background: var(--green); color: var(--white); }
    .btn-large    { padding: 18px 32px; font-size: 18px; border-radius: 16px; }
    .btn-full     { width: 100%; margin-top: 12px; }
    .btn-icon     { background: none; border: none; color: var(--blue);
                    font-size: 14px; font-weight: 600; cursor: pointer; padding: 4px 8px; }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border-radius: 20px;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    /* ── Login Screen ── */
    .login-screen {
      justify-content: center;
      align-items: center;
      padding: 24px;
      gap: 24px;
      background: linear-gradient(160deg, #eff6ff 0%, #ffffff 100%);
      overflow-y: auto;
    }

    .login-hero {
      text-align: center;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 8px;
    }

    .login-hero h1 {
      font-size: 36px;
      font-weight: 800;
      color: var(--blue);
      letter-spacing: -1px;
    }

    .subtitle {
      color: var(--gray-400);
      font-size: 15px;
      margin-top: 4px;
    }

    .login-screen .card {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-screen .card h2 {
      font-size: 20px;
      font-weight: 700;
    }

    .hint { font-size: 14px; color: var(--gray-400); }

    .qr-section { display: flex; }
    .qr-section .btn { flex: 1; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--gray-400);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    /* ── Forms ── */
    .form-group { display: flex; flex-direction: column; gap: 6px; }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-600);
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: inherit;
      color: var(--gray-800);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; }

    input:focus { border-color: var(--blue); }

    .error {
      color: var(--red);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      padding: 8px;
      background: #fef2f2;
      border-radius: 8px;
    }

    .hidden { display: none !important; }

    /* ── Table Screen ── */
    .table-screen { background: var(--white); }

    .center-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 32px;
    }

    .center-content h2 {
      font-size: 28px;
      font-weight: 700;
      color: var(--gray-800);
    }

    .table-input-wrap input {
      font-size: 72px !important;
      font-weight: 800 !important;
      text-align: center;
      width: 180px;
      padding: 20px !important;
      border-radius: 20px !important;
      border: 3px solid var(--gray-200) !important;
      color: var(--blue) !important;
    }

    .table-input-wrap input:focus {
      border-color: var(--blue) !important;
    }

    /* ── Order Screen ── */
    .order-screen { background: var(--gray-50); }

    .order-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 32px;
    }

    .category { margin-bottom: 16px; }

    .category-header {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gray-400);
      padding: 8px 4px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--white);
      padding: 14px 16px;
      border-radius: var(--radius);
      margin-bottom: 6px;
      box-shadow: var(--shadow);
    }

    .menu-item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .menu-item-name { font-weight: 600; font-size: 15px; }
    .menu-item-price { font-size: 13px; color: var(--gray-400); }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }

    .qty-btn:active { transform: scale(0.9); }
    .qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .qty-btn.plus { background: var(--blue); color: var(--white); }
    .qty-btn.minus { background: var(--gray-100); color: var(--gray-800); }

    .qty-num {
      font-size: 18px;
      font-weight: 700;
      min-width: 24px;
      text-align: center;
      color: var(--gray-800);
    }

    .cart {
      background: var(--white);
      border-radius: 16px;
      padding: 16px;
      margin-top: 8px;
      box-shadow: var(--shadow-lg);
      border: 2px solid var(--blue-light);
    }

    .cart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--gray-200);
    }

    .cart-total { color: var(--blue); font-size: 18px; }

    .cart-item {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      padding: 4px 0;
      color: var(--gray-600);
    }

    /* ── Cash Screen ── */
    .cash-screen { background: var(--gray-50); }

    .cash-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .cash-card {
      background: var(--white);
      border-radius: 20px;
      padding: 20px 24px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .total-card { background: var(--blue); }
    .total-card .cash-label { color: rgba(255,255,255,0.8); }
    .total-card .cash-amount { color: var(--white); }

    .cash-label {
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-400);
    }

    .cash-amount {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -2px;
      color: var(--gray-800);
      font-variant-numeric: tabular-nums;
    }

    .given-input {
      font-size: 48px !important;
      font-weight: 800 !important;
      letter-spacing: -2px;
      text-align: center;
      border: none !important;
      padding: 0 !important;
      color: var(--gray-800) !important;
    }

    .quick-amounts {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
    }

    .quick-btn {
      flex-shrink: 0;
      padding: 12px 18px;
      border-radius: 14px;
      border: 2px solid var(--blue);
      background: var(--white);
      color: var(--blue);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .quick-btn:active { transform: scale(0.95); }

    .quick-btn-primary {
      background: var(--blue);
      color: var(--white);
    }

    .change-card { border: 2px solid #dcfce7; }
    .change-amount { color: var(--green) !important; }

    /* ── QR Video ── */
    #qr-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 100;
      background: #000;
    }

    /* ── Loading ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 4px solid var(--gray-200);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-8px); }
      75%       { transform: translateX(8px); }
    }

    /* ── Responsive ── */
    @media (min-width: 480px) {
      .login-screen { padding: 40px; }
      .order-content { padding: 16px 24px 40px; }
      .cash-content  { padding: 24px 24px 40px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/app.js"></script>
</body>
</html>
